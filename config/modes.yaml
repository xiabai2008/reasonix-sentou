# Reasonix 渗透作战 — 操作模式定义
# 启动时指定模式: "用安全模式扫一下 192.168.1.1"
# 默认: normal

modes:
  safe:
    label: "安全模式"
    description: "仅被动信息收集和轻量检测，不发送攻击载荷"
    allowed_tools:
      - httpx
      - subfinder
      - tlsx
      - gau
      - katana
      - dnsx
      - jq
    allowed_tools_wsl:
      - nmap    # 仅 -sV -sC（服务识别，不算主动攻击）
    tool_constraints:
      httpx: "-silent -status-code -title -tech-detect"  # 只探测，不发送漏洞载荷
      nuclei: null  # safe 模式禁用 nuclei
      fscan: null  # safe 模式禁用 fscan
      nmap: "-sV -sC --top-ports 100"  # 只做服务识别
      ffuf: null   # safe 模式禁用目录爆破
    max_threads: 10
    timeout_per_target: 60
    pre_scan_scope_check: true

  normal:
    label: "标准模式"
    description: "默认模式，包含漏洞检测但不执行高危利用"
    allowed_tools: "*"  # 所有工具可用
    allowed_tools_wsl: "*"
    tool_constraints:
      nuclei: "-severity low,medium,high -c 25"
      fscan: "-nobrute"  # 不爆破
      sqlmap: "--batch --level 3 --risk 1"  # 限制风险等级
      ffuf: "-t 50 -fc 404"
      nmap: "-sV -sC -p-"
    max_threads: 50
    timeout_per_target: 300
    pre_scan_scope_check: true

  aggressive:
    label: "激进模式"
    description: "全工具全参数，含爆破、漏洞利用、内存马注入"
    allowed_tools: "*"
    allowed_tools_wsl: "*"
    tool_constraints:
      nuclei: "-severity low,medium,high,critical -c 50"
      fscan: null  # 无限制
      sqlmap: "--batch --level 5 --risk 3"
      # --os-shell 为极高危操作，需人工显式确认后追加
      # 使用方式: sqlmap <base_args> --os-shell (需 Docker 隔离环境下执行)
      ffuf: "-t 200 -fc 404"
      nmap: "-sV -sC -sS -A -p- --script=vuln"
      hydra: "-t 16 -f"
    max_threads: 200
    timeout_per_target: 0  # 无超时限制
    pre_scan_scope_check: true
    require_confirmation: true  # 激进模式操作前需人工确认
    isolation_required:
      - sqlmap_os_shell  # 需要 Docker 隔离（不再作为默认参数，需显式追加 --os-shell）
      - metasploit       # 需要 Kali WSL 隔离
      - webshell_write   # 需要人工确认

# 模式触发关键词（Reasonix 从用户输入中自动识别）
triggers:
  safe: ["安全模式", "safe mode", "被动扫描", "只收集", "侦察", "recon only", "不要攻击", "只看看"]
  normal: ["标准模式", "normal", "默认"]
  aggressive: ["激进模式", "aggressive", "全量", "全部工具", "暴力", "深度渗透", "全力"]
