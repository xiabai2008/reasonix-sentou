id: ssti-detection
info:
  name: 服务端模板注入检测
  severity: high
  description: 检测服务端模板注入漏洞 (SSTI)，通过注入唯一标记并检测回显
  tags: ssti,injection,template,high
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/?name={{randstr}}"
      - "{{BaseURL}}/?q={{randstr}}"
      - "{{BaseURL}}/?search={{randstr}}"
      - "{{BaseURL}}/?page={{randstr}}"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "{{randstr}}"
        part: body
