id: deserialization-java
info:
  name: Java 反序列化检测
  severity: critical
  description: 检测 Java 反序列化漏洞
  tags: deserialization,java,rce,critical
  author: poxiao

http:
  - method: POST
    path:
      - "{{BaseURL}}/"
    headers:
      Content-Type: "application/x-java-serialized-object"
    body: "rO0ABXNyABFqYXZhLnV0aWwuSGFzaE1hcA=="
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "java.io.ObjectInputStream"
          - "java.io.InvalidClassException"
          - "java.lang.ClassNotFoundException"
          - "Serialization"
        condition: or
        part: body
      - type: status
        status: [500]
