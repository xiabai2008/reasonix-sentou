id: directory-listing
info:
  name: 目录遍历
  severity: medium
  description: Web 服务器开启目录遍历，泄露目录结构
  tags: directory-listing,misconfig
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/images/"
      - "{{BaseURL}}/upload/"
      - "{{BaseURL}}/uploads/"
      - "{{BaseURL}}/static/"
      - "{{BaseURL}}/assets/"
      - "{{BaseURL}}/backup/"
      - "{{BaseURL}}/temp/"
      - "{{BaseURL}}/tmp/"
      - "{{BaseURL}}/log/"
      - "{{BaseURL}}/logs/"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "Index of"
          - "Directory listing"
          - "目录列表"
          - "<title>Index of"
          - "Parent Directory"
        condition: or
        part: body
