id: api-metrics-endpoint-v2
info:
  name: Metrics API 端点检测 v2
  severity: info
  description: 检测 Metrics API 端点
  tags: api,metrics,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2/metrics"
      - "{{BaseURL}}/api/v2/stats"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "metrics"
          - "Metrics"
          - "counter"
          - "gauge"
          - "histogram"
        condition: or
        part: body
