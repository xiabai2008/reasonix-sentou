id: api-debug-endpoint-v2
info:
  name: Debug API 端点检测 v2
  severity: info
  description: 检测 Debug API 端点
  tags: api,debug,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2/debug"
      - "{{BaseURL}}/api/v2/trace"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "debug"
          - "Debug"
          - "trace"
          - "Trace"
        condition: or
        part: body
