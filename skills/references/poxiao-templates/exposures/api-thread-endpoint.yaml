id: api-thread-endpoint
info:
  name: Thread API 端点检测
  severity: info
  description: 检测 Thread API 端点
  tags: api,thread,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/threads"
      - "{{BaseURL}}/api/threads"
      - "{{BaseURL}}/threads"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "thread"
          - "Thread"
          - "messages"
          - "replies"
        condition: or
        part: body
