id: api-logs-endpoint
info:
  name: Logs API 端点检测
  severity: info
  description: 检测 Logs API 端点
  tags: api,logs,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/logs"
      - "{{BaseURL}}/api/logs"
      - "{{BaseURL}}/logs"
      - "{{BaseURL}}/api/v1/logging"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "log"
          - "Log"
          - "logs"
          - "logging"
          - "level"
        condition: or
        part: body
