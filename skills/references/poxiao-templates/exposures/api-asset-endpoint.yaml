id: api-asset-endpoint
info:
  name: Asset API 端点检测
  severity: info
  description: 检测 Asset API 端点
  tags: api,asset,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/assets"
      - "{{BaseURL}}/api/assets"
      - "{{BaseURL}}/assets"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "asset"
          - "Asset"
          - "url"
          - "type"
          - "filename"
        condition: or
        part: body
