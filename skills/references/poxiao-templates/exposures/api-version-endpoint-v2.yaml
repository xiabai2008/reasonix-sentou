id: api-version-endpoint-v2
info:
  name: Version API 端点检测 v2
  severity: info
  description: 检测 Version API 端点
  tags: api,version,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2/version"
      - "{{BaseURL}}/api/v2/info"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "version"
          - "Version"
          - "build"
          - "Build"
        condition: or
        part: body
