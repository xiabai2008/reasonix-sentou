id: api-get-method
info:
  name: API GET 方法支持
  severity: info
  description: 检测 API GET 方法支持，验证返回 JSON 格式数据
  tags: api,get,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1"
      - "{{BaseURL}}/api"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "application/json"
        part: header
      - type: regex
        regex:
          - "\\S+"
        part: body
        negative: false
