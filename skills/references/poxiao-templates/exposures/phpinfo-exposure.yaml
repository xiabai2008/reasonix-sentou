id: phpinfo-exposure
info:
  name: phpinfo() 信息泄露
  severity: medium
  description: phpinfo() 页面暴露，泄露服务器配置信息
  tags: phpinfo,exposure,php,medium
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/test.php"
      - "{{BaseURL}}/i.php"
      - "{{BaseURL}}/p.php"
      - "{{BaseURL}}/pi.php"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "phpinfo()"
          - "PHP Version"
          - "PHP Extension"
          - "Configuration File (php.ini)"
        condition: or
        part: body
    extractors:
      - type: regex
        regex:
          - "PHP Version\\s*</td><td[^>]*>\\s*([0-9.]+)"
        name: php_version
