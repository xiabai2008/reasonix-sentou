id: api-changelog-endpoint
info:
  name: Changelog API 端点检测
  severity: info
  description: 检测 Changelog API 端点
  tags: api,changelog,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/changelog"
      - "{{BaseURL}}/api/changelog"
      - "{{BaseURL}}/changelog"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "changelog"
          - "Changelog"
          - "changes"
          - "version"
        condition: or
        part: body
