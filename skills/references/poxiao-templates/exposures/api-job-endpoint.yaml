id: api-job-endpoint
info:
  name: Job API 端点检测
  severity: info
  description: 检测 Job API 端点
  tags: api,job,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/jobs"
      - "{{BaseURL}}/api/jobs"
      - "{{BaseURL}}/jobs"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "job"
          - "Job"
          - "task"
          - "queue"
          - "status"
        condition: or
        part: body
