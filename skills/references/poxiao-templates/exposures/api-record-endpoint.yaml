id: api-record-endpoint
info:
  name: Record API 端点检测
  severity: info
  description: 检测 Record API 端点
  tags: api,record,info
  author: poxiao

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/records"
      - "{{BaseURL}}/api/records"
      - "{{BaseURL}}/records"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 404]
      - type: word
        words:
          - "record"
          - "Record"
          - "id"
          - "data"
        condition: or
        part: body
